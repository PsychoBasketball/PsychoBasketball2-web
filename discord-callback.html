<!doctype html>
<html lang="en-us">
<head><meta charset="utf-8"><title>Signing in…</title>
<style>html,body{margin:0;height:100%;background:#0e1422;color:#cdd6ff;font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center}</style></head>
<body>
  <div>Signing you in&hellip; you can close this window.</div>
  <script>
    // Discord OAuth2 implicit-flow redirect target. Discord sends the access token in the URL fragment.
    // We exchange it for the user's identity HERE (so the token never leaves the popup), then postMessage the
    // result to the game window (same origin) and close. Registered as the Discord redirect URI.
    (function () {
      function done(payload) {
        try { if (window.opener) window.opener.postMessage(payload, location.origin); } catch (e) {}
        window.close();
      }
      var token = null;
      try { token = new URLSearchParams(location.hash.replace(/^#/, "")).get("access_token"); } catch (e) {}
      if (!token) { done({ pbDiscord: { ok: false } }); return; }
      fetch("https://discord.com/api/users/@me", { headers: { Authorization: "Bearer " + token } })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (u) {
          if (u && u.id) done({ pbDiscord: { ok: true, id: String(u.id), name: u.global_name || u.username || "", username: u.username || "", email: u.email || "" } });
          else done({ pbDiscord: { ok: false } });
        })
        .catch(function () { done({ pbDiscord: { ok: false } }); });
    })();
  </script>
</body>
</html>
